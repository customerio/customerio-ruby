name: Publish to RubyGems

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: rubygems

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1
